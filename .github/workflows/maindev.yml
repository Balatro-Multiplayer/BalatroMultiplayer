name: Test Multiplayer Mod

on:
  push:
    branches: [ dev, issue147 ]
  pull_request:
    branches: [ dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Lua
      uses: leafo/gh-actions-lua@v10
      with:
        luaVersion: "5.4"
    
    - name: Syntax of all Lua files
      run: |
        for file in $(find . -name "*.lua" -not -path "./.git/*" -not -path "./.lua/*"); do
          echo "Checking $file"
          lua -e "assert(loadfile('$file'))"
        done
